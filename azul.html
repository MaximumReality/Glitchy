<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quantum Quest: Superposition</title>
    <script src="https://pixijs.download/v7.x/pixi.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>
<script>
   // --- New Variables for Obstacles ---
const obstacles = [];
const obstacleSpeed = 5;
let score = 0;

// Create a Score Text (Neon Style)
const scoreStyle = new PIXI.TextStyle({
    fill: "#00ffff",
    fontFamily: "Courier New",
    fontSize: 24,
    fontWeight: "bold",
    dropShadow: true,
    dropShadowColor: "#ff00ff",
    dropShadowBlur: 4,
});
const scoreText = new PIXI.Text('STABILITY: 100%', scoreStyle);
scoreText.x = 20;
scoreText.y = 40;
app.stage.addChild(scoreText);

// --- Obstacle Factory ---
function createObstacle() {
    const obstacle = new PIXI.Graphics();
    obstacle.beginFill(0xff3333); // Red = Danger/Collapse
    obstacle.drawRect(-40, -10, 80, 20);
    obstacle.endFill();
    
    obstacle.x = app.screen.width / 2;
    obstacle.y = -50;
    
    app.stage.addChild(obstacle);
    obstacles.push(obstacle);
}

// Spawn an obstacle every 1.5 seconds
setInterval(createObstacle, 1500);

// --- Updated Game Loop ---
app.ticker.add((delta) => {
    // 1. Handle Superposition Logic (Existing)
    if (isSuperpositioned) {
        if (playerA.x > 50) playerA.x -= 5 * delta;
        if (playerB.x < app.screen.width - 50) playerB.x += 5 * delta;
        playerB.alpha = 0.8;
    } else {
        playerA.x += (app.screen.width / 2 - playerA.x) * 0.1;
        playerB.x = playerA.x;
        playerB.alpha = 0;
    }

    // 2. Obstacle Movement & Collision
    for (let i = obstacles.length - 1; i >= 0; i--) {
        const ob = obstacles[i];
        ob.y += obstacleSpeed * delta;

        // Simple AABB Collision Check
        const hitA = Math.abs(ob.x - playerA.x) < 40 && Math.abs(ob.y - playerA.y) < 20;
        const hitB = isSuperpositioned && Math.abs(ob.x - playerB.x) < 40 && Math.abs(ob.y - playerB.y) < 20;

        if (hitA || hitB) {
            // WAVE FUNCTION COLLAPSE! 
            ob.tint = 0xffffff; 
            score -= 1;
            scoreText.text = `STABILITY: ${Math.max(0, 100 + score)}%`;
            scoreText.style.fill = "#ff0000";
        } else {
            scoreText.style.fill = "#00ffff";
        }

        // Cleanup obstacles that leave the screen
        if (ob.y > app.screen.height + 50) {
            app.stage.removeChild(ob);
            obstacles.splice(i, 1);
        }
    }
});

</script>
</body>
</html>
