<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MaximumReality | Sprite Matrix</title>
<style>
  :root {
    --neon-blue: #00f2ff;
    --neon-pink: #ff00ff;
    --bg-dark: #0a0a0a;
  }

  body {
    background-color: var(--bg-dark);
    color: white;
    font-family: 'Courier New', Courier, monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    margin: 0;
    padding: 20px 10px;
    overflow-x: hidden;
  }

  h1 {
    color: var(--neon-blue);
    text-shadow: 0 0 10px var(--neon-blue);
    letter-spacing: 4px;
    text-transform: uppercase;
    text-align: center;
    font-size: 2em;
    margin: 10px 0;
  }

  p {
    text-align: center;
    font-size: 1em;
    margin: 5px 0 20px 0;
  }

  .sprite-display {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    width: 100%;
  }

  .character-card {
    flex: 0 1 45%;
    max-width: 200px;
    text-align: center;
    border: 2px solid #333;
    padding: 15px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 12px;
    transition: all 0.3s ease;
  }

  .character-card:hover {
    border-color: var(--neon-pink);
    box-shadow: 0 0 15px var(--neon-pink);
  }

  .character-card img {
    width: 100%;
    height: auto;
    object-fit: contain;
    background: #1a1a1a;
    display: block;
    border-radius: 8px;
  }

  .glitch-btn {
    margin-top: 25px;
    padding: 12px 25px;
    background: transparent;
    color: var(--neon-blue);
    border: 2px solid var(--neon-blue);
    cursor: pointer;
    font-weight: bold;
    text-transform: uppercase;
    transition: 0.3s;
    border-radius: 8px;
    font-size: 1em;
  }

  .glitch-btn:hover {
    background: var(--neon-blue);
    color: black;
    box-shadow: 0 0 12px var(--neon-blue);
  }

  @media (max-width: 400px) {
    .character-card {
      flex: 0 1 80%;
    }

    h1 {
      font-size: 1.6em;
    }

    p {
      font-size: 0.9em;
    }
  }
</style>
</head>
<body>

<h1>MaximumReality.xyz</h1>
<p>Asset Matrix: Sprite Randomizer v1.0</p>

<div class="sprite-display">
  <div class="character-card">
    <img id="azul-sprite" src="azul_idle.png" alt="Azul">
    <h3 style="color: var(--neon-blue);">Azul</h3>
  </div>

  <div class="character-card">
    <img id="mochkil-sprite" src="mochkil-idle.png" alt="Mochkil">
    <h3 style="color: var(--neon-pink);">Mochkil</h3>
  </div>
</div>

<button class="glitch-btn" onclick="randomizeSprites()">Trigger Reality Shift</button>

<script>
  // === Sprite pools ===
  const azulPool = [
    'azul-action-figure.png',
    'azul-cat.png',
    'azul-cat2.png',
    'azul-cube.png',
    'azul-hacker.png',
    'azul-insight.png',
    'azul-run.png',
    'azul-tactical.png',
    'corporate-azul.png',
    'flying-azul-front-facing.png',
    'glitchy-azul.png',
    'holding_azulos.png',
    'idle_azul.png',
    'punk-Azul.png',
    'waiting_azul.png'
  ];

  const mochkilPool = [
    'Mochkil-party.png',
    'Mochkil-plate.png',
    'Mochkil.png',
    'distract-Mochkil.png',
    'mochkil-bite.png',
    'mochkil-cheese.png',
    'mochkil-cross.png',
    'mochkil-harira.png',
    'mochkil-idle.png',   // dash version
    'mochkil_idle.png',   // underscore version
    'mochkil-old.png',
    'mochkil-skate.png',
    'mochkil_chaos.png',
    'mochkil_front_kart.png',
    'mochkil_happy.png',
    'mochkil-left.png',
    'mochkil_puffs.PNG',
    'mochkil_thief.png',
    'mochkil_walk_right_cake.png',
    'red_mochkil_rt.png'
  ];

  // === Randomizer function ===
  function randomizeSprites() {
    const azulImg = document.getElementById('azul-sprite');
    const mochkilImg = document.getElementById('mochkil-sprite');

    const newAzul = azulPool[Math.floor(Math.random() * azulPool.length)];
    const newMochkil = mochkilPool[Math.floor(Math.random() * mochkilPool.length)];

    azulImg.src = newAzul;
    mochkilImg.src = newMochkil;

    console.log(`Reality Shifted → Azul: ${newAzul}, Mochkil: ${newMochkil}`);
  }

  // Run once on page load
  window.onload = randomizeSprites;
</script>
</body>
</html>
