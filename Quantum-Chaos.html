<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Maximum Reality: Quantum Chaos</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width:100%; height:100%;
  overflow:hidden;
  background:#000;
  font-family:'Share Tech Mono', 'Courier New', monospace;
  touch-action:none;
  -webkit-tap-highlight-color: transparent;
}

#c { display:block; width:100%; height:100%; }

/* ── HUD TITLE ── */
#hud-title {
  position:fixed; top:14px; left:50%; transform:translateX(-50%);
  font-size:11px; letter-spacing:4px; color:#00ff88;
  text-shadow:0 0 10px #00ff88, 0 0 24px #00ff8860;
  text-transform:uppercase; pointer-events:none; white-space:nowrap;
  z-index:20;
}

/* ── EFFECT NOTIFICATION ── */
#notif {
  position:fixed; top:46px; left:50%; transform:translateX(-50%);
  font-size:13px; letter-spacing:3px; color:#fff;
  text-shadow:0 0 12px currentColor;
  text-transform:uppercase; pointer-events:none;
  opacity:0; transition:opacity 0.15s;
  z-index:20; white-space:nowrap;
}
#notif.show { opacity:1; }
#notif.glitch {
  animation: glitch 0.4s steps(1) infinite;
}
@keyframes glitch {
  0%   { clip-path:inset(0 0 85% 0); transform:translateX(calc(-50% + 3px)); color:#0ff; }
  20%  { clip-path:inset(60% 0 0 0);  transform:translateX(calc(-50% - 3px)); color:#f0f; }
  40%  { clip-path:inset(30% 0 40% 0);transform:translateX(calc(-50% + 2px)); color:#ff0; }
  60%  { clip-path:inset(70% 0 10% 0);transform:translateX(-50%);             color:#0ff; }
  80%  { clip-path:inset(10% 0 70% 0);transform:translateX(calc(-50% - 2px)); color:#fff; }
  100% { clip-path:inset(0 0 85% 0);  transform:translateX(calc(-50% + 1px)); color:#f0f; }
}

/* ── STATS ── */
#stats {
  position:fixed; top:14px; left:16px;
  font-size:9px; letter-spacing:2px; color:#00ffe5;
  text-shadow:0 0 8px #00ffe5;
  line-height:1.9; pointer-events:none; z-index:20;
  opacity:0.75;
}

/* ── ACTIVE EFFECT BADGE ── */
#effect-badge {
  position:fixed; top:14px; right:16px;
  font-size:8px; letter-spacing:2px;
  padding:4px 8px;
  border:1px solid currentColor;
  opacity:0; transition:opacity 0.3s;
  pointer-events:none; z-index:20;
}
#effect-badge.show { opacity:1; }

/* ── MOBILE CONTROLS ── */
#controls {
  position:fixed; bottom:24px; left:0; right:0;
  display:flex; justify-content:space-between;
  align-items:flex-end; padding:0 20px;
  pointer-events:none; z-index:30;
}

.dpad {
  display:grid;
  grid-template-columns:50px 50px 50px;
  grid-template-rows:50px 50px 50px;
  gap:4px;
  pointer-events:all;
}

.btn {
  background:rgba(0,255,136,0.08);
  border:1px solid rgba(0,255,136,0.3);
  border-radius:6px;
  color:#00ff88;
  font-family:'Share Tech Mono', monospace;
  font-size:18px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer;
  user-select:none;
  -webkit-user-select:none;
  transition:background 0.1s, box-shadow 0.1s;
  touch-action:manipulation;
  backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px);
}
.btn:active, .btn.pressed {
  background:rgba(0,255,136,0.25);
  box-shadow:0 0 14px rgba(0,255,136,0.5);
}

#btn-up    { grid-column:2; grid-row:1; }
#btn-left  { grid-column:1; grid-row:2; }
#btn-down  { grid-column:2; grid-row:2; }
#btn-right { grid-column:3; grid-row:2; }

#btn-jump {
  width:80px; height:80px;
  border-radius:50%;
  background:rgba(0,200,255,0.1);
  border:2px solid rgba(0,200,255,0.4);
  color:#00c8ff;
  font-size:11px; letter-spacing:1px;
  pointer-events:all;
  backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px);
}
#btn-jump:active, #btn-jump.pressed {
  background:rgba(0,200,255,0.3);
  box-shadow:0 0 20px rgba(0,200,255,0.6);
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="hud-title">⬡ MAXIMUM REALITY: QUANTUM CHAOS ⬡</div>
<div id="notif"></div>

<div id="stats">
  SCORE: <span id="s-score">0</span><br>
  ITEMS: <span id="s-items">0</span><br>
  MODE: <span id="s-mode">NORMAL</span>
</div>

<div id="effect-badge"></div>

<div id="controls">
  <div class="dpad">
    <div class="btn" id="btn-up">▲</div>
    <div class="btn" id="btn-left">◀</div>
    <div class="btn" id="btn-down">▼</div>
    <div class="btn" id="btn-right">▶</div>
  </div>
  <div class="btn" id="btn-jump">JUMP</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ══════════════════════════════════════════════
//  ITEM DATABASE — JSON config (swap in Mochkil
//  snacks by editing this array)
// ══════════════════════════════════════════════
const ITEM_DATA = [
  // Cubes — effect, color, coords
  { type:"cube",   effect:"SPEED_BOOST",  color:0xff3366, x: 8,  z: 4  },
  { type:"cube",   effect:"GHOST_MODE",   color:0xbf00ff, x:-10, z: 7  },
  { type:"cube",   effect:"LOW_GRAVITY",  color:0x00ffe5, x: 5,  z:-12 },
  { type:"cube",   effect:"SPEED_BOOST",  color:0xff6600, x:-6,  z:-5  },
  { type:"cube",   effect:"GHOST_MODE",   color:0xff00ff, x: 14, z:-8  },
  { type:"cube",   effect:"LOW_GRAVITY",  color:0x00ff88, x:-14, z: 11 },
  { type:"cube",   effect:"SPEED_BOOST",  color:0xffee00, x: 3,  z: 16 },
  { type:"cube",   effect:"GHOST_MODE",   color:0xff3366, x:-18, z:-3  },
  { type:"sphere", effect:"LOW_GRAVITY",  color:0x00c8ff, x: 11, z: 9  },
  { type:"sphere", effect:"SPEED_BOOST",  color:0xff3366, x:-7,  z: 14 },
  { type:"sphere", effect:"GHOST_MODE",   color:0xbf00ff, x: 16, z: 2  },
  { type:"sphere", effect:"LOW_GRAVITY",  color:0x00ff88, x:-12, z:-10 },
  { type:"sphere", effect:"SPEED_BOOST",  color:0xff6600, x: 0,  z: 20 },
  { type:"sphere", effect:"GHOST_MODE",   color:0x00ffe5, x: 20, z:-14 },
  { type:"cube",   effect:"LOW_GRAVITY",  color:0xffee00, x:-20, z: 17 },
  { type:"sphere", effect:"SPEED_BOOST",  color:0xff00ff, x: 9,  z:-18 },
  // -- Add Mochkil snack items here --
   { type:"cube", effect:"SPEED_BOOST", color:0xff8800, x:6, z:6, label:"SARDINE" },
  { type:"sphere", effect:"GHOST_MODE", color:0xffffff, x:-9, z:9, label:"MILK" },
    { type:"cube", effect:"SPEED_BOOST", color:0xFFA500, x: 5, z: 5, label:"SPICY TACO" },
{ type:"sphere", effect:"LOW_GRAVITY", color:0xFFFFFF, x: -8, z: -8, label:"GHASTLY MILK" },
{ type:"cube", effect:"GHOST_MODE", color:0x00FF00, x: 12, z: -3, label:"MATCHA MOCHI" },

];

// ══════════════════════════════════════════════
//  QUANTUM CHAOS EFFECTS CONFIG
// ══════════════════════════════════════════════
const EFFECTS = {
  SPEED_BOOST: { label:"⚡ SPEED BOOST",  color:"#ff3366", duration:5000,
    apply:(s)=>{ s.speed=0.18; s.fov=90; },
    remove:(s)=>{ s.speed=0.10; s.fov=70; } },
  GHOST_MODE:  { label:"👻 GHOST MODE",   color:"#bf00ff", duration:5000,
    apply:(s)=>{ s.ghost=true; },
    remove:(s)=>{ s.ghost=false; } },
  LOW_GRAVITY: { label:"🌙 LOW GRAVITY",  color:"#00ffe5", duration:6000,
    apply:(s)=>{ s.gravity=0.005; s.jumpForce=0.22; },
    remove:(s)=>{ s.gravity=0.018; s.jumpForce=0.14; } },
};

// ══════════════════════════════════════════════
//  SCENE SETUP
// ══════════════════════════════════════════════
const canvas   = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:false, powerPreference:'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = false;

const scene  = new THREE.Scene();
scene.fog    = new THREE.FogExp2(0x000510, 0.022);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 300);

// ── AMBIENT + SCENE LIGHT ──
scene.add(new THREE.AmbientLight(0x111133, 1.2));
const dirLight = new THREE.DirectionalLight(0x0033ff, 0.6);
dirLight.position.set(0, 20, 10);
scene.add(dirLight);

// ══════════════════════════════════════════════
//  NEON GRID FLOOR
// ══════════════════════════════════════════════
(function buildFloor() {
  // Base dark plane
  const plane = new THREE.Mesh(
    new THREE.PlaneGeometry(400, 400),
    new THREE.MeshBasicMaterial({ color:0x010818 })
  );
  plane.rotation.x = -Math.PI/2;
  plane.position.y = 0;
  scene.add(plane);

  // Neon grid lines via GridHelper
  const grid = new THREE.GridHelper(400, 80, 0x00ff88, 0x003322);
  grid.position.y = 0.01;
  grid.material.transparent = true;
  grid.material.opacity = 0.55;
  scene.add(grid);

  // Secondary fine grid
  const grid2 = new THREE.GridHelper(400, 400, 0x001a33, 0x001a33);
  grid2.position.y = 0.005;
  grid2.material.transparent = true;
  grid2.material.opacity = 0.3;
  scene.add(grid2);
})();

// ══════════════════════════════════════════════
//  MATRIX RAIN SKYBOX (canvas texture)
// ══════════════════════════════════════════════
const rainCanvas  = document.createElement('canvas');
rainCanvas.width  = 512;
rainCanvas.height = 512;
const rainCtx     = rainCanvas.getContext('2d');
const rainTex     = new THREE.CanvasTexture(rainCanvas);

const COLS   = Math.floor(rainCanvas.width / 14);
const drops  = Array.from({length:COLS}, ()=>Math.random()*rainCanvas.height);
const CHARS  = "01アイウエオカキクケコサシスセソタチツテト日本語MATRIX量子カオス";

function updateRain() {
  rainCtx.fillStyle = 'rgba(0,2,12,0.18)';
  rainCtx.fillRect(0,0,rainCanvas.width,rainCanvas.height);
  rainCtx.font = '13px monospace';
  for (let i=0; i<drops.length; i++) {
    const bright = Math.random() > 0.92;
    rainCtx.fillStyle = bright ? '#afffcf' : (Math.random()>0.5 ? '#00ff41' : '#008822');
    rainCtx.fillText(CHARS[Math.floor(Math.random()*CHARS.length)], i*14, drops[i]);
    if (drops[i] > rainCanvas.height && Math.random() > 0.975) drops[i] = 0;
    drops[i] += 14;
  }
  rainTex.needsUpdate = true;
}

// Sphere skybox
const skyGeo  = new THREE.SphereGeometry(200, 24, 24);
const skyMat = new THREE.MeshBasicMaterial({ 
  map: rainTex, 
  side: THREE.BackSide,
  fog: false // This ensures the matrix code doesn't get "lost" in the dark fog
});

const skyMesh = new THREE.Mesh(skyGeo, skyMat);
scene.add(skyMesh);

// ══════════════════════════════════════════════
//  SPHYNX CAT — geometric primitive build
// ══════════════════════════════════════════════
const catGroup = new THREE.Group();
scene.add(catGroup);

const skinColor  = 0xd4a882;
const skinMat    = new THREE.MeshLambertMaterial({ color:skinColor });
const darkMat    = new THREE.MeshLambertMaterial({ color:0x5c3d2e });
const noseMat    = new THREE.MeshLambertMaterial({ color:0xff8899 });

// Body
const body = new THREE.Mesh(
  new THREE.CylinderGeometry(0.38, 0.45, 0.9, 8),
  skinMat
);
body.position.y = 0.7;
catGroup.add(body);

// Neck
const neck = new THREE.Mesh(
  new THREE.CylinderGeometry(0.22, 0.28, 0.35, 8),
  skinMat
);
neck.position.y = 1.3;
catGroup.add(neck);

// Head
const head = new THREE.Mesh(
  new THREE.SphereGeometry(0.38, 12, 12),
  skinMat
);
head.position.y = 1.72;
catGroup.add(head);

// Muzzle
const muzzle = new THREE.Mesh(
  new THREE.SphereGeometry(0.16, 8, 8),
  skinMat
);
muzzle.position.set(0, 1.63, 0.3);
muzzle.scale.set(1.4, 0.9, 0.8);
catGroup.add(muzzle);

// Nose
const nose = new THREE.Mesh(
  new THREE.SphereGeometry(0.06, 6, 6),
  noseMat
);
nose.position.set(0, 1.67, 0.46);
catGroup.add(nose);

// EARS (large, distinctive)
[-1,1].forEach(side => {
  const earOuter = new THREE.Mesh(
    new THREE.ConeGeometry(0.22, 0.45, 4),
    skinMat
  );
  earOuter.position.set(side*0.28, 2.05, -0.05);
  earOuter.rotation.z = side * 0.15;
  catGroup.add(earOuter);

  const earInner = new THREE.Mesh(
    new THREE.ConeGeometry(0.12, 0.35, 4),
    new THREE.MeshLambertMaterial({ color:0xffaaaa })
  );
  earInner.position.set(side*0.28, 2.04, 0.04);
  earInner.rotation.z = side * 0.15;
  catGroup.add(earInner);
});

// EYES — glowing blue PointLights inside
const eyeMat = new THREE.MeshBasicMaterial({ color:0x00c8ff });
[-1,1].forEach(side => {
  const eyeball = new THREE.Mesh(
    new THREE.SphereGeometry(0.075, 8, 8),
    eyeMat
  );
  eyeball.position.set(side*0.14, 1.76, 0.32);
  catGroup.add(eyeball);

  // Pupil slit
  const pupil = new THREE.Mesh(
    new THREE.SphereGeometry(0.04, 6, 6),
    new THREE.MeshBasicMaterial({ color:0x000000 })
  );
  pupil.position.set(side*0.14, 1.76, 0.395);
  catGroup.add(pupil);

  // 🔵 BLUE POINT LIGHT in each eye
  const eyeLight = new THREE.PointLight(0x00c8ff, 2.5, 4.5);
  eyeLight.position.set(side*0.14, 1.76, 0.32);
  catGroup.add(eyeLight);
});

// Legs (4)
const legPositions = [
  [-0.22, 0.24, 0.18], [0.22, 0.24, 0.18],
  [-0.22, 0.24,-0.18], [0.22, 0.24,-0.18]
];
const legGeo = new THREE.CylinderGeometry(0.09, 0.08, 0.52, 6);
legPositions.forEach((pos,i)=>{
  const leg = new THREE.Mesh(legGeo, skinMat);
  leg.position.set(...pos);
  leg.name = 'leg'+i;
  catGroup.add(leg);
});

// Tail
const tailCurve = new THREE.QuadraticBezierCurve3(
  new THREE.Vector3(0, 0.6,-0.4),
  new THREE.Vector3(0.4, 1.2,-0.6),
  new THREE.Vector3(0.5, 0.9,-0.3)
);
const tailGeo = new THREE.TubeGeometry(tailCurve, 10, 0.05, 5, false);
const tail    = new THREE.Mesh(tailGeo, skinMat);
catGroup.add(tail);

// Wrinkle lines on head (dark)
for(let i=0;i<3;i++){
  const wrinkle = new THREE.Mesh(
    new THREE.TorusGeometry(0.12+i*0.04, 0.008, 4, 8, Math.PI*0.5),
    darkMat
  );
  wrinkle.position.set(0, 1.78+i*0.05, 0.22);
  wrinkle.rotation.y = Math.PI/2;
  catGroup.add(wrinkle);
}

catGroup.position.set(0, 0, 0);

// ══════════════════════════════════════════════
//  COLLECTIBLE ITEMS — from JSON data
// ══════════════════════════════════════════════
const items = [];

ITEM_DATA.forEach(data => {
  let mesh;
  const wireMat = new THREE.MeshBasicMaterial({
    color: data.color,
    wireframe: true
  });

  if (data.type === "cube") {
    mesh = new THREE.Mesh(
      new THREE.BoxGeometry(0.9, 0.9, 0.9),
      wireMat
    );
    // Unique per-axis rotation speeds for "quantum" feel
    mesh.userData.rotX = (Math.random()*0.02+0.005) * (Math.random()>0.5?1:-1);
    mesh.userData.rotY = (Math.random()*0.03+0.008) * (Math.random()>0.5?1:-1);
    mesh.userData.rotZ = (Math.random()*0.015+0.003)* (Math.random()>0.5?1:-1);
  } else {
    mesh = new THREE.Mesh(
      new THREE.IcosahedronGeometry(0.55, 1),
      wireMat
    );
    mesh.userData.rotX = (Math.random()*0.025+0.007)*(Math.random()>0.5?1:-1);
    mesh.userData.rotY = (Math.random()*0.018+0.005)*(Math.random()>0.5?1:-1);
    mesh.userData.rotZ = (Math.random()*0.022+0.006)*(Math.random()>0.5?1:-1);
  }

  mesh.position.set(data.x, 0.8 + Math.random()*0.4, data.z);
  mesh.userData.effect    = data.effect;
  mesh.userData.baseColor = data.color;
  mesh.userData.bobOffset = Math.random() * Math.PI * 2;
  mesh.userData.active    = true;

  // Glow point light on each item
  const glow = new THREE.PointLight(data.color, 1.2, 3.5);
  glow.position.copy(mesh.position);
  scene.add(glow);
  mesh.userData.glowLight = glow;

  scene.add(mesh);
  items.push(mesh);
});

// ══════════════════════════════════════════════
//  PLAYER STATE
// ══════════════════════════════════════════════
const player = {
  pos:       new THREE.Vector3(0, 0, 0),
  vel:       new THREE.Vector3(0, 0, 0),
  speed:     0.10,
  jumpForce: 0.14,
  gravity:   0.018,
  onGround:  true,
  ghost:     false,
  fov:       70,
  score:     0,
  collected: 0,
  facing:    0,   // radians
  walkCycle: 0,
  activeEffect: null,
  effectTimer:  null,
};

// ══════════════════════════════════════════════
//  INPUT STATE
// ══════════════════════════════════════════════
const keys = { up:false, down:false, left:false, right:false, jump:false };

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key==='ArrowUp'    || e.key==='w' || e.key==='W') keys.up    = true;
  if (e.key==='ArrowDown'  || e.key==='s' || e.key==='S') keys.down  = true;
  if (e.key==='ArrowLeft'  || e.key==='a' || e.key==='A') keys.left  = true;
  if (e.key==='ArrowRight' || e.key==='d' || e.key==='D') keys.right = true;
  if (e.key===' ') { keys.jump = true; e.preventDefault(); }
});
document.addEventListener('keyup', e => {
  if (e.key==='ArrowUp'    || e.key==='w' || e.key==='W') keys.up    = false;
  if (e.key==='ArrowDown'  || e.key==='s' || e.key==='S') keys.down  = false;
  if (e.key==='ArrowLeft'  || e.key==='a' || e.key==='A') keys.left  = false;
  if (e.key==='ArrowRight' || e.key==='d' || e.key==='D') keys.right = false;
  if (e.key===' ') keys.jump = false;
});

// Mobile buttons
function bindBtn(id, key) {
  const el = document.getElementById(id);
  const press   = e => { e.preventDefault(); keys[key]=true;  el.classList.add('pressed'); };
  const release = e => { e.preventDefault(); keys[key]=false; el.classList.remove('pressed'); };
  el.addEventListener('touchstart',  press,   {passive:false});
  el.addEventListener('touchend',    release, {passive:false});
  el.addEventListener('touchcancel', release, {passive:false});
  el.addEventListener('mousedown',   press);
  el.addEventListener('mouseup',     release);
  el.addEventListener('mouseleave',  release);
}
bindBtn('btn-up',    'up');
bindBtn('btn-down',  'down');
bindBtn('btn-left',  'left');
bindBtn('btn-right', 'right');
bindBtn('btn-jump',  'jump');

// ══════════════════════════════════════════════
//  EFFECT SYSTEM
// ══════════════════════════════════════════════
const notif = document.getElementById('notif');
const badge = document.getElementById('effect-badge');

function triggerEffect(effectKey) {
  const ef = EFFECTS[effectKey];
  if (!ef) return;

  // Clear previous
  if (player.effectTimer) {
    clearTimeout(player.effectTimer);
    if (player.activeEffect) EFFECTS[player.activeEffect].remove(player);
  }

  player.activeEffect = effectKey;
  ef.apply(player);

  // Notification
  notif.textContent = ef.label;
  notif.style.color = ef.color;
  notif.style.textShadow = `0 0 16px ${ef.color}`;
  notif.classList.add('show','glitch');
  setTimeout(()=>{ notif.classList.remove('glitch'); }, 600);
  setTimeout(()=>{ notif.classList.remove('show'); }, 2200);

  // Badge
  badge.textContent  = ef.label;
  badge.style.color  = ef.color;
  badge.style.borderColor = ef.color;
  badge.style.boxShadow   = `0 0 10px ${ef.color}40`;
  badge.classList.add('show');

  // HUD mode
  document.getElementById('s-mode').textContent = effectKey.replace('_',' ');
  document.getElementById('s-mode').style.color = ef.color;

  // FOV animation
  camera.fov = player.fov;
  camera.updateProjectionMatrix();

  player.effectTimer = setTimeout(()=>{
    ef.remove(player);
    player.activeEffect = null;
    badge.classList.remove('show');
    document.getElementById('s-mode').textContent = 'NORMAL';
    document.getElementById('s-mode').style.color = '';
    camera.fov = player.fov;
    camera.updateProjectionMatrix();
  }, ef.duration);
}

// ══════════════════════════════════════════════
//  COLLISION DETECTION
// ══════════════════════════════════════════════
const COLLECT_DIST = 1.6;

function checkCollisions() {
  items.forEach(item => {
    if (!item.userData.active) return;
    const dx = item.position.x - player.pos.x;
    const dz = item.position.z - player.pos.z;
    const dist = Math.sqrt(dx*dx+dz*dz);
    if (dist < COLLECT_DIST) {
      // Collect
      item.userData.active = false;
      scene.remove(item);
      if (item.userData.glowLight) scene.remove(item.userData.glowLight);

      player.score     += 100;
      player.collected += 1;
      document.getElementById('s-score').textContent = player.score;
      document.getElementById('s-items').textContent = player.collected;

      triggerEffect(item.userData.effect);

      // Respawn after 8 seconds at a new random position
      setTimeout(()=>{
        item.position.x = (Math.random()-0.5)*44;
        item.position.z = (Math.random()-0.5)*44;
        item.userData.active = true;
        scene.add(item);
        if (item.userData.glowLight) {
          item.userData.glowLight.position.copy(item.position);
          scene.add(item.userData.glowLight);
        }
      }, 8000);
    }
  });
}

// ══════════════════════════════════════════════
//  RAIN UPDATE THROTTLE
// ══════════════════════════════════════════════
let rainFrame = 0;

// ══════════════════════════════════════════════
//  MAIN LOOP
// ══════════════════════════════════════════════
let lastJump = false;
const clock  = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const dt = Math.min(clock.getDelta(), 0.05);
  const t  = clock.getElapsedTime();

  // ── Matrix rain (every 2 frames) ──
    updateRain(); 
  rainTex.needsUpdate = true;


  // ── Player movement ──
  let moveX = 0, moveZ = 0;
  if (keys.up)    moveZ -= 1;
  if (keys.down)  moveZ += 1;
  if (keys.left)  moveX -= 1;
  if (keys.right) moveX += 1;

  const moving = moveX !== 0 || moveZ !== 0;

  if (moving) {
    // Normalize diagonal
    const len = Math.sqrt(moveX*moveX+moveZ*moveZ);
    moveX /= len; moveZ /= len;

    player.pos.x += moveX * player.speed;
    player.pos.z += moveZ * player.speed;
    player.facing = Math.atan2(moveX, moveZ); Math.PI;
    player.walkCycle += 0.18;
  }

  // ── Jump ──
  if (keys.jump && !lastJump && player.onGround) {
    player.vel.y = player.jumpForce;
    player.onGround = false;
  }
  lastJump = keys.jump;

  // ── Gravity ──
  if (!player.onGround) {
    player.vel.y -= player.gravity;
    player.pos.y += player.vel.y;
    if (player.pos.y <= 0) {
      player.pos.y    = 0;
      player.vel.y    = 0;
      player.onGround = true;
    }
  }

  // ── Position bounds ──
  player.pos.x = Math.max(-95, Math.min(95, player.pos.x));
  player.pos.z = Math.max(-95, Math.min(95, player.pos.z));

  // ── Cat group position ──
  catGroup.position.x = player.pos.x;
  catGroup.position.z = player.pos.z;
  catGroup.position.y = player.pos.y;
  catGroup.rotation.y = player.facing;

  // ── Ghost opacity ──
  catGroup.traverse(child => {
    if (child.isMesh && child.material) {
      child.material.transparent = player.ghost;
      child.material.opacity     = player.ghost ? 0.28 : 1.0;
    }
  });

  // ── Walk animation — leg swing ──
  if (moving) {
    catGroup.children.forEach(child => {
      if (child.name && child.name.startsWith('leg')) {
        const idx = parseInt(child.name.replace('leg',''));
        const phase = idx % 2 === 0 ? player.walkCycle : player.walkCycle + Math.PI;
        child.rotation.x = Math.sin(phase) * 0.35;
      }
    });
    // Body bob
    body.position.y = 0.7 + Math.sin(player.walkCycle*2)*0.03;
  }

  // ── Camera follow ──
  const camOffset = new THREE.Vector3(0, 5, 9);
  const idealPos  = catGroup.position.clone().add(camOffset);
  camera.position.lerp(idealPos, 0.12);
  camera.lookAt(catGroup.position.x, catGroup.position.y+1.2, catGroup.position.z);

  // ── Animate items ──
  items.forEach(item => {
    if (!item.userData.active) return;
    // Quantum rotation on all 3 axes at different speeds
    item.rotation.x += item.userData.rotX;
    item.rotation.y += item.userData.rotY;
    item.rotation.z += item.userData.rotZ;
    // Bob
    const base = item.userData.bobOffset;
    item.position.y = 0.8 + Math.sin(t*1.8 + base) * 0.25;
    if (item.userData.glowLight) {
      item.userData.glowLight.position.y = item.position.y;
      // Pulse glow intensity
      item.userData.glowLight.intensity = 1.0 + Math.sin(t*3+base)*0.6;
    }
  });

  // ── Collision check ──
  checkCollisions();

  // ── FOV smooth interpolation ──
  if (Math.abs(camera.fov - player.fov) > 0.5) {
    camera.fov += (player.fov - camera.fov) * 0.08;
    camera.updateProjectionMatrix();
  }

  renderer.render(scene, camera);
}

// ── Resize ──
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

camera.position.set(0, 5, 9);
animate();
</script>
